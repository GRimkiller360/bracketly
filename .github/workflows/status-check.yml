name: Daily Status Snapshot

on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check every page for broken responses
        id: pages
        run: |
          mkdir -p status
          curl -s https://bracketly.pages.dev/sitemap-0.xml | grep -o '<loc>[^<]*</loc>' | sed 's/<[^>]*>//g' > urls.txt
          echo "[]" > broken.json
          while read -r url; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url")
            if [ "$code" != "200" ]; then
              node -e "
                const fs = require('fs');
                const b = JSON.parse(fs.readFileSync('broken.json', 'utf8'));
                b.push({ url: process.argv[1], status: process.argv[2] });
                fs.writeFileSync('broken.json', JSON.stringify(b));
              " "$url" "$code"
            fi
          done < urls.txt
          echo "checked $(wc -l < urls.txt) pages"
          cat broken.json

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: https://bracketly.pages.dev/
          uploadArtifacts: false
          temporaryPublicStorage: false
        continue-on-error: true

      - name: Query Search Console
        id: gsc
        continue-on-error: true
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: node .github/scripts/gsc-query.mjs > gsc.json

      - name: Query AdSense revenue
        id: adsense
        continue-on-error: true
        env:
          ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID }}
          ADSENSE_CLIENT_SECRET: ${{ secrets.ADSENSE_CLIENT_SECRET }}
          ADSENSE_REFRESH_TOKEN: ${{ secrets.ADSENSE_REFRESH_TOKEN }}
        run: node .github/scripts/adsense-query.mjs > adsense.json

      - name: Gather site + analytics data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SITE_STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://bracketly.pages.dev/)
          SEVEN_DAYS_AGO=$(date -u -d '7 days ago' +%Y-%m-%d)

          AD_SLOT="8066491572"
          if curl -s https://bracketly.pages.dev/ | grep -q "data-ad-slot=\"$AD_SLOT\""; then
            AD_RENDERING="true"
          else
            AD_RENDERING="false"
          fi

          ANALYTICS=$(curl -s -X POST "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            -d "{\"query\":\"query { viewer { accounts(filter: {accountTag: \\\"$CLOUDFLARE_ACCOUNT_ID\\\"}) { daily: rumPageloadEventsAdaptiveGroups(limit: 20, filter: {date_geq: \\\"$SEVEN_DAYS_AGO\\\"}, orderBy: [date_DESC]) { count dimensions { date } } pages: rumPageloadEventsAdaptiveGroups(limit: 30, filter: {date_geq: \\\"$SEVEN_DAYS_AGO\\\"}, orderBy: [count_DESC]) { count dimensions { requestPath refererHost countryName } } } } }\"}")

          LH_FILE=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1 || echo "")
          GSC_FILE="gsc.json"
          [ -s "$GSC_FILE" ] || echo '{}' > "$GSC_FILE"
          ADSENSE_FILE="adsense.json"
          [ -s "$ADSENSE_FILE" ] || echo '{}' > "$ADSENSE_FILE"

          node -e "
            const fs = require('fs');
            const analytics = JSON.parse(process.argv[2]);
            const groups = analytics?.data?.viewer?.accounts?.[0] ?? { daily: [], pages: [] };
            const broken = JSON.parse(fs.readFileSync('broken.json', 'utf8'));
            const lhFile = process.argv[3];
            const gsc = JSON.parse(fs.readFileSync(process.argv[4], 'utf8'));
            const adsense = JSON.parse(fs.readFileSync(process.argv[5], 'utf8'));

            let lighthouse = null;
            if (lhFile && fs.existsSync(lhFile)) {
              try {
                const lhr = JSON.parse(fs.readFileSync(lhFile, 'utf8'));
                lighthouse = Object.fromEntries(
                  Object.entries(lhr.categories).map(([k, v]) => [k, Math.round(v.score * 100)])
                );
              } catch (e) {
                lighthouse = { error: 'failed to parse lighthouse report' };
              }
            }

            const totalPageloads = (groups.daily ?? []).reduce((a, d) => a + d.count, 0);

            const out = {
              generated_at: new Date().toISOString(),
              site_status_code: process.argv[1],
              broken_pages: broken,
              lighthouse,
              search_console: {
                note: 'Search Console data lags ~2-3 days and needs time after indexing to populate; empty arrays are expected for a new/low-traffic site, not a bug.',
                top_queries: gsc.top_queries ?? [],
                top_pages: gsc.top_pages ?? [],
              },
              adsense: {
                note: 'account_state NEEDS_ATTENTION means AdSense has not approved the account for ad serving yet — earnings will be null until approved, this is expected and not a bug to fix.',
                account_state: adsense.account_state ?? 'UNKNOWN',
                earnings_last_7_days: adsense.earnings ?? null,
                ad_unit_slot: process.argv[6],
                ad_unit_rendering: process.argv[7] === 'true',
              },
              last_7_days: {
                daily_pageloads: groups.daily ?? [],
                total_pageloads: totalPageloads,
                top_requests: groups.pages ?? [],
              },
            };
            fs.mkdirSync('status', { recursive: true });
            fs.writeFileSync('status/latest.json', JSON.stringify(out, null, 2));

            // Append a compact entry to the running history log for trend comparison.
            const historyEntry = JSON.stringify({
              date: new Date().toISOString().slice(0, 10),
              total_pageloads_7d: totalPageloads,
              site_status_code: process.argv[1],
              broken_page_count: broken.length,
              lighthouse_performance: lighthouse?.performance ?? null,
              gsc_total_query_clicks: (gsc.top_queries ?? []).reduce((a, r) => a + (r.clicks ?? 0), 0),
              adsense_account_state: adsense.account_state ?? null,
              adsense_estimated_earnings: adsense.earnings?.estimated_earnings ?? null,
              ad_unit_rendering: process.argv[7] === 'true',
            });
            fs.appendFileSync('status/history.jsonl', historyEntry + '\n');
          " "$SITE_STATUS" "$ANALYTICS" "$LH_FILE" "$GSC_FILE" "$ADSENSE_FILE" "$AD_SLOT" "$AD_RENDERING"

          cat status/latest.json

      - name: Commit snapshot
        run: |
          git config user.name "bracketly-bot"
          git config user.email "actions@github.com"
          git add status/latest.json status/history.jsonl
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update daily status snapshot" && git push)

      - name: Push snapshot to loan-dashboard
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          BRACKETLY_INGEST_SECRET: ${{ secrets.BRACKETLY_INGEST_SECRET }}
        run: |
          curl -s -X POST "$DASHBOARD_URL/api/bracketly-status/ingest" \
            -H "X-Ingest-Secret: $BRACKETLY_INGEST_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @status/latest.json \
            -w "\nHTTP_STATUS:%{http_code}\n"
