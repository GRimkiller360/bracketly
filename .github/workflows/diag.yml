name: Diagnose secrets

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Hash secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo -n "$CF_TOKEN" | wc -c
          echo -n "$CF_TOKEN" | sha256sum
          echo -n "$CF_ACCOUNT_ID" | wc -c
          echo -n "$CF_ACCOUNT_ID" | sha256sum
